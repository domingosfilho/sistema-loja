<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Financeiro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">

    <h2 class="text-center mb-1">💰 Sistema Financeiro</h2>
    <p class="text-center subtitulo">LOJAS MAESTRO</p>

    <div class="row text-center g-3 mb-4">

        <div class="col-12 col-md-4">
            <div class="card">
                <h5>Total de Vendas</h5>
                <h3 id="totalVendas">R$ 0</h3>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card">
                <h5>Saldo em Caixa</h5>
                <h3 id="saldoCaixa">R$ 0</h3>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card">
                <h5>Produto Mais Vendido</h5>
                <h3 id="maisVendido">-</h3>
            </div>
        </div>

    </div>

    <!-- ESTOQUE -->
    <div class="card">
        <h5>📦 Estoque Atual</h5>

        <table class="table table-dark mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Estoque</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody id="produtos"></tbody>
        </table>
    </div>

    <!-- VENDAS -->
    <div class="card mt-4">
        <h5>📊 Produtos Vendidos</h5>

        <table class="table table-dark mt-3">
            <thead>
                <tr>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Preço Unitário</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tabelaVendas"></tbody>
        </table>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
